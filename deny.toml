[advisories]
yanked = "warn"
ignore = [
    # rsa timing sidechannel (Marvin Attack) — no fix available.
    # Only reachable via age's SSH-RSA recipient support; murk prefers ed25519.
    "RUSTSEC-2023-0071",
    # rustls-webpki CRL matching logic — transitive via ureq, fix with next dep bump
    "RUSTSEC-2026-0049",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
